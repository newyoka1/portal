<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Response Recorded — Politika NYC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',-apple-system,sans-serif; background:#f0f2f5; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.08); max-width:440px; width:100%; padding:48px 40px; text-align:center; }
    .icon { font-size:52px; margin-bottom:20px; line-height:1; }
    h1 { font-size:22px; font-weight:700; color:#050505; letter-spacing:-0.3px; margin-bottom:12px; }
    p { font-size:15px; color:#65676B; line-height:1.6; }
    .footer { margin-top:32px; font-size:12px; color:#b0b3b8; }
</style>
</head>
<body>
<div class="card">
    {% if status == 'approved' %}
        <div class="icon">✅</div>
        <h1>Ad Approved</h1>
        <p>{{ message }}</p>

    {% elif status == 'rejected' %}
        <div class="icon">❌</div>
        <h1>Ad Rejected</h1>
        <p>{{ message }}</p>

    {% elif status == 'already' %}
        <div class="icon">ℹ️</div>
        <h1>Already Responded</h1>
        <p>{{ message }}</p>

    {% else %}
        <div class="icon">⚠️</div>
        <h1>Something went wrong</h1>
        <p>{{ message }}</p>
    {% endif %}

    <div class="footer">Politika NYC Ad Approval System</div>
</div>
</body>
</html>
