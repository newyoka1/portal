<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Response — Politika NYC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',-apple-system,sans-serif; background:#f0f2f5; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.08); max-width:480px; width:100%; overflow:hidden; }
    .card-header { padding:28px 32px 24px; border-bottom:1px solid #e4e6eb; }
    .card-body { padding:28px 32px; }
    .action-label { display:inline-flex; align-items:center; gap:8px; padding:6px 16px; border-radius:20px; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:16px; }
    .action-approve { background:#dcfce7; color:#166534; }
    .action-reject  { background:#fee2e2; color:#7f1d1d; }
    h1 { font-size:20px; font-weight:700; color:#050505; letter-spacing:-0.3px; }
    .ad-name { font-size:14px; color:#65676B; margin-top:4px; }
    label { display:block; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:#65676B; margin-bottom:8px; }
    textarea {
        width:100%; padding:12px 14px; font-size:14px; font-family:inherit;
        background:#f8f9fc; border:1px solid #ced0d4; border-radius:8px;
        color:#050505; resize:vertical; min-height:100px; line-height:1.6;
        transition:border-color 0.15s;
    }
    textarea:focus { outline:none; border-color:#1877F2; box-shadow:0 0 0 3px rgba(24,119,242,0.15); }
    .hint { font-size:12px; color:#65676B; margin-top:6px; }
    .actions { display:flex; gap:12px; margin-top:24px; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:12px 24px; font-size:14px; font-weight:700; font-family:inherit; border:none; border-radius:8px; cursor:pointer; text-decoration:none; flex:1; transition:opacity 0.15s; }
    .btn:hover { opacity:0.88; }
    .btn-approve { background:#22c55e; color:#fff; }
    .btn-reject  { background:#ef4444; color:#fff; }
    .btn-cancel  { background:#e4e6eb; color:#050505; flex:0 0 auto; padding:12px 20px; }
</style>
</head>
<body>
<div class="card">
    <div class="card-header">
        {% if action == 'approve' %}
        <div class="action-label action-approve">✓ Approving</div>
        {% else %}
        <div class="action-label action-reject">✕ Rejecting</div>
        {% endif %}
        <h1>Confirm your response</h1>
        <div class="ad-name">For: <strong>{{ approval.get('ad_id', '') }}</strong></div>
    </div>
    <div class="card-body">
        <form method="POST" action="/respond/{{ token }}/{{ action }}">
            <input type="hidden" name="confirmed" value="1">
            <div>
                <label for="comments">Comments <span style="font-weight:400; text-transform:none; letter-spacing:0;">(optional)</span></label>
                <textarea id="comments" name="comments" placeholder="Add any feedback or notes for the team…"></textarea>
                <div class="hint">Your comments will be visible in the approval dashboard.</div>
            </div>
            <div class="actions">
                <a href="javascript:history.back()" class="btn btn-cancel">← Back</a>
                {% if action == 'approve' %}
                <button type="submit" class="btn btn-approve">✓ Confirm Approval</button>
                {% else %}
                <button type="submit" class="btn btn-reject">✕ Confirm Rejection</button>
                {% endif %}
            </div>
        </form>
    </div>
</div>
</body>
</html>
