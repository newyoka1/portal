<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Email Approval{% endblock %} — Politika</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
  <a class="navbar-brand fw-bold" href="/">
    <i class="bi bi-envelope-check-fill me-2"></i>Email Approval
  </a>
  <div class="d-flex align-items-center gap-3">
    {% if current_user %}
      <span class="text-white-50 small">{{ current_user.name }}</span>
      <a href="/log" class="text-white-50 small text-decoration-none">
        <i class="bi bi-journal-check me-1"></i>Log
      </a>
      {% if current_user.is_admin %}
        <a href="/clients" class="text-white-50 small text-decoration-none">
          <i class="bi bi-people me-1"></i>Clients
        </a>
        <a href="/users" class="text-white-50 small text-decoration-none">
          <i class="bi bi-person-gear me-1"></i>Users
        </a>
      {% endif %}
      <a href="/logout" class="btn btn-sm btn-outline-secondary">Sign out</a>
    {% endif %}
  </div>
</nav>

{% if flash %}
<div class="alert alert-{{ flash.type }} alert-dismissible fade show rounded-0 mb-0" role="alert">
  {{ flash.message }}
  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endif %}

<main class="container-fluid py-4">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
